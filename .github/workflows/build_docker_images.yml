name: build docker images

# Rebuilds all str-analysis docker images in parallel and pushes them to Docker Hub.
# After the builds finish, the updated sha256_dockerhub.txt digest files are committed back to the repo.
#
# This workflow does NOT run directly on push. Instead it runs after the "unit tests" workflow
# completes, and only proceeds when that run (a) succeeded, (b) was triggered by a push to main, and
# (c) touched the docker images or installed source (checked by the guard job below). This guarantees
# images are only built/published from a commit whose tests passed. It can also be triggered manually
# (Actions tab -> "build docker images" -> "Run workflow"), which bypasses the test gate.
#
# It publishes images and commits the updated sha256_dockerhub.txt files back to the default branch;
# that commit uses [skip ci] so it does not re-run the tests and therefore does not re-trigger this
# workflow.
#
# Required repository secrets:
#   DOCKERHUB_USERNAME - Docker Hub account name
#   DOCKERHUB_TOKEN    - Docker Hub access token with read/write/delete scope

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["unit tests"]
    types:
      - completed

permissions:
  contents: write

jobs:
  guard:
    name: gate on tests + changed paths
    runs-on: ubuntu-latest
    # Run only for a manual dispatch, or a successful "unit tests" run that was triggered by a push to
    # main. Test runs from pull requests or failed test runs do not match, so the build is skipped.
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.event == 'push' &&
       github.event.workflow_run.head_branch == 'main')
    outputs:
      run: ${{ steps.decide.outputs.run }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Decide whether to build
        id: decide
        run: |
          set -euo pipefail
          # A manual dispatch always builds (no path filtering).
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Manual trigger: building."
            echo "run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Otherwise build only when docker-relevant files changed in the tested commit.
          head='${{ github.event.workflow_run.head_sha }}'
          if git rev-parse "${head}^" >/dev/null 2>&1; then
            base="${head}^"
          else
            base=$(git rev-list --max-parents=0 "$head" | tail -n 1)
          fi
          echo "Comparing ${base}..${head}"
          files=$(git diff --name-only "$base" "$head")
          echo "Changed files:"
          echo "$files"
          if echo "$files" | grep -Eq '^(docker/|docker_with_[^/]+/|str_analysis/|requirements\.txt|setup\.py|\.github/workflows/build_docker_images\.yml)'; then
            echo "Docker-relevant changes found: building."
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "No docker-relevant changes: skipping build."
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi

  build:
    name: build ${{ matrix.image }}
    needs: guard
    if: needs.guard.outputs.run == 'true'
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        image:
          - docker
          - docker_with_expansion_hunter
          - docker_with_gangstr
          - docker_with_hipstr
          - docker_with_inquistr
          - docker_with_longtr
          - docker_with_trgt

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push to Docker Hub
        working-directory: ${{ matrix.image }}
        run: |
          set -euo pipefail
          # Reuse the Dockerfile/tag defined in the per-image Makefile, but push only the Docker Hub tag.
          make build
          TAG=$(grep -E '^DOCKERHUB_TAG' Makefile | cut -d'=' -f2 | xargs)
          BASE=${TAG%:latest}
          docker push "$TAG" | tee push.log
          grep -E 'latest: digest: sha256:' push.log \
            | sed -E 's/.*(sha256:[0-9a-f]+).*/\1/' \
            | sed "s|^|${BASE}@|" > sha256_dockerhub.txt
          echo "Updated $(pwd)/sha256_dockerhub.txt:"
          cat sha256_dockerhub.txt

      - name: Upload sha256 digest
        uses: actions/upload-artifact@v4
        with:
          name: sha256-${{ matrix.image }}
          path: ${{ matrix.image }}/sha256_dockerhub.txt

  commit-shas:
    name: commit sha256 digests
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download sha256 digests
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Place updated digest files
        run: |
          set -euo pipefail
          for d in docker docker_with_expansion_hunter docker_with_gangstr docker_with_hipstr docker_with_inquistr docker_with_longtr docker_with_trgt; do
            if [ -f "artifacts/sha256-${d}/sha256_dockerhub.txt" ]; then
              cp "artifacts/sha256-${d}/sha256_dockerhub.txt" "${d}/sha256_dockerhub.txt"
            fi
          done

      - name: Commit and push
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add */sha256_dockerhub.txt
          if git diff --cached --quiet; then
            echo "No sha256 changes to commit"
            exit 0
          fi
          git commit -m "Update docker image sha256 digests [skip ci]"
          # Another commit may land on main during the multi-minute build, which would make a bare push
          # a non-fast-forward. Rebase onto the latest main and retry a few times before giving up.
          for attempt in 1 2 3 4 5; do
            git pull --rebase origin main && git push && exit 0
            echo "Push attempt ${attempt} failed; refetching and retrying."
            sleep 5
          done
          echo "Failed to push sha256 digests after multiple attempts."
          exit 1
