name: build docker images

# Rebuilds all str-analysis docker images in parallel and pushes them to Docker Hub.
# After the builds finish, the updated sha256_dockerhub.txt digest files are committed back to the repo.
#
# Manual trigger only (Actions tab -> "build docker images" -> "Run workflow"), since it publishes
# images and commits to the default branch.
#
# Required repository secrets:
#   DOCKERHUB_USERNAME - Docker Hub account name
#   DOCKERHUB_TOKEN    - Docker Hub access token with read/write/delete scope

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: build ${{ matrix.image }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        image:
          - docker
          - docker_with_expansion_hunter
          - docker_with_gangstr
          - docker_with_hipstr
          - docker_with_longtr
          - docker_with_trgt

    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push to Docker Hub
        working-directory: ${{ matrix.image }}
        run: |
          set -euo pipefail
          # Reuse the Dockerfile/tag defined in the per-image Makefile, but push only the Docker Hub tag.
          make build
          TAG=$(grep -E '^DOCKERHUB_TAG' Makefile | cut -d'=' -f2 | xargs)
          BASE=${TAG%:latest}
          docker push "$TAG" | tee push.log
          grep -E 'latest: digest: sha256:' push.log \
            | sed -E 's/.*(sha256:[0-9a-f]+).*/\1/' \
            | sed "s|^|${BASE}@|" > sha256_dockerhub.txt
          echo "Updated $(pwd)/sha256_dockerhub.txt:"
          cat sha256_dockerhub.txt

      - name: Upload sha256 digest
        uses: actions/upload-artifact@v4
        with:
          name: sha256-${{ matrix.image }}
          path: ${{ matrix.image }}/sha256_dockerhub.txt

  commit-shas:
    name: commit sha256 digests
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download sha256 digests
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Place updated digest files
        run: |
          set -euo pipefail
          for d in docker docker_with_expansion_hunter docker_with_gangstr docker_with_hipstr docker_with_longtr docker_with_trgt; do
            if [ -f "artifacts/sha256-${d}/sha256_dockerhub.txt" ]; then
              cp "artifacts/sha256-${d}/sha256_dockerhub.txt" "${d}/sha256_dockerhub.txt"
            fi
          done

      - name: Commit and push
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add */sha256_dockerhub.txt
          if git diff --cached --quiet; then
            echo "No sha256 changes to commit"
          else
            git commit -m "Update docker image sha256 digests [skip ci]"
            git push
          fi
